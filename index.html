<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙台半馬 2026 行程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f7f4;
  --bg2: #ffffff;
  --bg3: #edf3ed;
  --text: #1a2e1f;
  --text2: #5a7862;
  --border: rgba(46,125,69,0.14);
  --sendai: #2e7d45;
  --sendai-light: #3a9455;
  --sendai-pale: #e8f5e9;

  /* card accent colours */
  --c-flight:  #1565c0;
  --c-flight-bg: #e8f0fe;
  --c-flight-border: rgba(21,101,192,0.2);

  --c-race:    #2e7d45;
  --c-race-bg: #e8f5e9;
  --c-race-border: rgba(46,125,69,0.22);

  --c-food:    #e65100;
  --c-food-bg: #fff3e0;
  --c-food-border: rgba(230,81,0,0.2);

  --c-hotel:   #6a1b9a;
  --c-hotel-bg: #f3e5f5;
  --c-hotel-border: rgba(106,27,154,0.2);

  --c-car:     #c62828;
  --c-car-bg:  #ffebee;
  --c-car-border: rgba(198,40,40,0.2);

  --c-default: #2e7d45;
  --c-default-bg: #f4f7f4;
  --c-default-border: rgba(46,125,69,0.14);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }

/* ── loading / error ── */
#loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:999; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--sendai); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-screen p { font-size:13px; color:var(--text2); }
#error-screen { display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:999; padding:2rem; }
#error-screen p { font-size:14px; color:var(--text2); text-align:center; line-height:1.8; white-space:pre-line; }
#error-screen button { background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:8px 20px; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* ── header ── */
header { background:var(--bg2); border-bottom:1px solid var(--border); padding:1.6rem 1.25rem 1.2rem; text-align:center; }
.header-label { font-size:11px; letter-spacing:0.18em; color:var(--sendai); text-transform:uppercase; margin-bottom:0.4rem; }
header h1 { font-family:'Noto Serif TC',serif; font-size:1.65rem; font-weight:600; color:var(--text); line-height:1.3; }
.header-sub { margin-top:0.3rem; font-size:13px; color:var(--text2); }
.header-badges { display:flex; justify-content:center; gap:7px; flex-wrap:wrap; margin-top:0.85rem; }
.badge { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:3px 11px; font-size:11px; }
.badge-race  { background:var(--c-race-bg);  border:1px solid var(--c-race-border);  color:var(--c-race); }
.badge-pax   { background:var(--c-flight-bg); border:1px solid var(--c-flight-border); color:var(--c-flight); }
.badge-sync  { background:var(--bg3); border:1px solid var(--border); color:var(--sendai); cursor:pointer; transition:opacity 0.2s; }
.badge-sync:hover { opacity:0.75; }
.dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

/* ── day tabs nav ── */
.days-nav { display:flex; overflow-x:auto; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 0.5rem; scrollbar-width:none; position:sticky; top:0; z-index:50; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.days-nav::-webkit-scrollbar { display:none; }
.day-tab { flex-shrink:0; padding:0.6rem 0.9rem; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.18s; white-space:nowrap; text-align:center; line-height:1.4; }
.day-tab.active { color:var(--sendai); border-bottom-color:var(--sendai); font-weight:500; }
.day-tab:hover { color:var(--text); }
.tab-date { font-size:10px; opacity:0.65; display:block; }

/* ── main content ── */
main { padding:1rem 1rem 5.5rem; max-width:480px; margin:0 auto; }
.day-section { display:none; }
.day-section.active { display:block; }

/* ── day header ── */
.day-header { display:flex; align-items:center; gap:9px; margin:0.3rem 0 1rem; }
.day-number { background:var(--sendai); color:#fff; font-size:10px; font-weight:700; letter-spacing:0.08em; padding:3px 9px; border-radius:4px; flex-shrink:0; }
.day-number.race-day { background:var(--c-race); }
.day-title { font-size:14px; font-weight:500; color:var(--text); flex:1; }

/* ── timeline ── */
.event-list { display:flex; flex-direction:column; }
.event-item { display:flex; }
.timeline-col { width:54px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; position:relative; }
.time-label { font-size:10px; color:var(--text2); padding-top:0.6rem; line-height:1.2; text-align:center; z-index:2; width:100%; letter-spacing:0.01em; }
.timeline-line { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); width:1px; background:var(--border); }
.timeline-dot { position:absolute; top:2.3rem; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%; z-index:1; }

/* dot colours per type */
.timeline-dot.flight { background:var(--c-flight-bg); border:2px solid var(--c-flight); }
.timeline-dot.race   { background:var(--c-race-bg);   border:2px solid var(--c-race); }
.timeline-dot.food   { background:var(--c-food-bg);   border:2px solid var(--c-food); }
.timeline-dot.hotel  { background:var(--c-hotel-bg);  border:2px solid var(--c-hotel); }
.timeline-dot.car    { background:var(--c-car-bg);    border:2px solid var(--c-car); }
.timeline-dot.default { background:var(--c-default-bg); border:2px solid var(--c-default); }

/* ── event cards ── */
.event-card { flex:1; border-radius:10px; padding:0.7rem 0.9rem 0.75rem; margin:0.4rem 0 0.4rem 8px; position:relative; overflow:hidden; min-height:3rem; border-left-width:3px; border-left-style:solid; }

.event-card.flight { background:var(--c-flight-bg); border-color:var(--c-flight); border-top:1px solid var(--c-flight-border); border-right:1px solid var(--c-flight-border); border-bottom:1px solid var(--c-flight-border); }
.event-card.race   { background:var(--c-race-bg);   border-color:var(--c-race);   border-top:1px solid var(--c-race-border);   border-right:1px solid var(--c-race-border);   border-bottom:1px solid var(--c-race-border); }
.event-card.food   { background:var(--c-food-bg);   border-color:var(--c-food);   border-top:1px solid var(--c-food-border);   border-right:1px solid var(--c-food-border);   border-bottom:1px solid var(--c-food-border); }
.event-card.hotel  { background:var(--c-hotel-bg);  border-color:var(--c-hotel);  border-top:1px solid var(--c-hotel-border);  border-right:1px solid var(--c-hotel-border);  border-bottom:1px solid var(--c-hotel-border); }
.event-card.car    { background:var(--c-car-bg);    border-color:var(--c-car);    border-top:1px solid var(--c-car-border);    border-right:1px solid var(--c-car-border);    border-bottom:1px solid var(--c-car-border); }
.event-card.default{ background:var(--bg2);         border-color:var(--sendai);   border-top:1px solid var(--border);          border-right:1px solid var(--border);          border-bottom:1px solid var(--border); }

.event-type  { font-size:10px; letter-spacing:0.09em; text-transform:uppercase; margin-bottom:2px; font-weight:500; }
.event-card.flight .event-type { color:var(--c-flight); }
.event-card.race   .event-type { color:var(--c-race); }
.event-card.food   .event-type { color:var(--c-food); }
.event-card.hotel  .event-type { color:var(--c-hotel); }
.event-card.car    .event-type { color:var(--c-car); }
.event-card.default .event-type { color:var(--sendai); }

.event-title  { font-size:14px; font-weight:500; color:var(--text); line-height:1.4; }
.event-hint   { font-size:12px; color:var(--text2); margin-top:4px; line-height:1.55; }
.event-alert  { display:inline-block; font-size:10px; margin-top:5px; padding:2px 8px; border-radius:10px; }
.alert-warn   { background:rgba(230,81,0,0.1); color:var(--c-food); border:1px solid rgba(230,81,0,0.25); }
.alert-info   { background:var(--c-race-bg); color:var(--c-race); border:1px solid var(--c-race-border); }
.alert-race   { background:var(--c-race-bg); color:var(--c-race); border:1px solid var(--c-race-border); font-weight:500; }

/* ── people pills ── */
.people-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }
.person { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(255,255,255,0.7); color:var(--text2); border:1px solid rgba(0,0,0,0.1); }
.event-card.flight .person { background:rgba(255,255,255,0.8); color:var(--c-flight); border-color:rgba(21,101,192,0.2); }
.event-card.race   .person { background:rgba(255,255,255,0.8); color:var(--c-race);   border-color:rgba(46,125,69,0.25); }
.person.michael    { font-weight:500; border-width:1.5px; }
.event-card.flight .person.michael { border-color:var(--c-flight); }
.event-card.race   .person.michael { border-color:var(--c-race); }

/* ── footer nav ── */
footer { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); padding:0.5rem 0.6rem; display:flex; justify-content:center; gap:5px; z-index:100; box-shadow:0 -1px 6px rgba(0,0,0,0.06); }
.footer-btn { flex:1; max-width:90px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:10px; padding:5px 2px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.15s; line-height:1.4; text-align:center; }
.footer-btn:hover  { background:var(--sendai-pale); color:var(--sendai); border-color:var(--sendai); }
.footer-btn.active { background:var(--sendai-pale); color:var(--sendai); border-color:var(--sendai); font-weight:500; }
.footer-btn.race-btn.active { background:var(--c-race-bg); color:var(--c-race); border-color:var(--c-race); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>載入最新行程⋯</p>
</div>
<div id="error-screen">
  <p id="error-msg"></p>
  <button onclick="location.reload()">重新載入</button>
</div>

<header>
  <div class="header-label">Trip Itinerary</div>
  <h1>仙台半程馬拉松</h1>
  <div class="header-sub">2026 年 5 月 7 日 – 13 日　7 人同行</div>
  <div class="header-badges">
    <div class="badge badge-race"><div class="dot"></div>21.0975 km · 仙台市</div>
    <div class="badge badge-pax"><div class="dot"></div>7 人同行</div>
    <div class="badge badge-sync" id="sync-badge" onclick="fetchAndRender()">
      <div class="dot"></div><span id="sync-label">即時同步 Sheets</span>
    </div>
  </div>
</header>

<div class="days-nav" id="days-nav"></div>
<main id="main-content"></main>
<footer id="footer-nav"></footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxQU_6-KqqU3wZN7P5uVJ1wCa67p_Z1dwLnRJyFwTTuQ9ktWFm7QDWY7rFanyy42KGj/exec';
const MICHAEL_NAMES = ['Michael','michael','麥可'];
const FOOTER_LABELS = ['出發','松島','報到','比賽','品酒','Day6','返台'];

/* ── 說明文案字典 ─────────────────────────────────────────
   格式：{ 關鍵字（小寫）: { hint:'說明', alert:'注意事項', alertType:'warn|info|race' } }
   hint 顯示在卡片內容下方（灰色小字）
   alert 顯示為彩色標籤                                    */
const HINTS = {
  '牛舌':      { hint:'仙台名物！建議第一晚就吃，犒賞長途飛行', alert:null },
  '松島':      { hint:'日本三景之一，海灣小島與遊船。輕鬆步伐，賽前 -2 天，保存體力', alert:null },
  'yodobashi': { hint:'補充跑步裝備、買伴手禮的好去處', alert:null },
  'ishi sports':{ hint:'日本跑步專門店，可找賽場補給品', alert:null },
  'check in':  { hint:'領取號碼布時記得攜帶報名確認信', alert:'勿忘報名確認信', alertType:'warn' },
  '號碼布':    { hint:'領取號碼布時記得攜帶報名確認信', alert:'勿忘報名確認信', alertType:'warn' },
  '選手之夜':  { hint:'與其他跑者交流的好機會', alert:null },
  'carbo':     { hint:'以白飯、烏龍麵、義大利麵等高碳水為主，避免高脂肪與高纖維食物', alert:'明天是比賽日！', alertType:'race' },
  'first wave':{ hint:'21.0975 km，全力以赴——仙台的風景陪著你跑完每一公里', alert:'提早 45 分鐘抵達起跑區', alertType:'warn' },
  'second wave':{ hint:'21.0975 km，全力以赴——仙台的風景陪著你跑完每一公里', alert:'提早 45 分鐘抵達起跑區', alertType:'warn' },
  '慶功':      { hint:'你跑完了，盡情享用！', alert:'完賽獎牌合照必拍', alertType:'info' },
  'nikka':     { hint:'日本威士忌聖地，建議事先預約導覽行程', alert:'自費品飲體驗', alertType:'info' },
  '宮城峽':    { hint:'日本威士忌聖地，建議事先預約導覽行程', alert:'自費品飲體驗', alertType:'info' },
  '一之坊':    { hint:'作並溫泉，賽後泡湯最療癒。入住後記得好好放鬆雙腿', alert:null },
  'bach':      { hint:'位於仙台市中心，交通便利', alert:null },
  'depart tpe':{ hint:'出發前確認護照、報名確認信、跑鞋都已打包', alert:null },
  'arrive sdj':{ hint:'入境後搭乘電車或巴士前往仙台市區約 30–45 分鐘', alert:null },
};

function getHint(text) {
  const t = text.toLowerCase();
  for (const [key, val] of Object.entries(HINTS)) {
    if (t.includes(key)) return val;
  }
  return null;
}

/* ── type classification ── */
function classify(text) {
  const t = (text||'').toLowerCase();
  if (/depart|arrive|br\d|jx\s?\d|起飛|落地|航班/.test(t)) return 'flight';
  if (/race|first wave|second wave|馬拉松|號碼布|選手報到|check.?in.*expo/.test(t)) return 'race';
  if (/hotel|check.?in|check.?out|住宿|飯店|旅館|一之坊|bach/.test(t)) return 'hotel';
  if (/餐|lunch|dinner|breakfast|牛舌|carbo|慶功|on flight/.test(t)) return 'food';
  if (/租車|還車|取車/.test(t)) return 'car';
  return 'default';
}

const TYPE_LABELS = {
  flight:'航班', race:'比賽 / 選手服務', food:'餐飲', hotel:'住宿', car:'租車', default:'行程'
};

function extractPeople(text) {
  const matches = [...(text||'').matchAll(/\(([^)]+)\)/g)];
  const people = [];
  matches.forEach(m => m[1].split(',').forEach(p => { const n=p.trim(); if(n) people.push(n); }));
  return people;
}
function stripPeople(text) { return (text||'').replace(/\s*\([^)]+\)/g,'').trim(); }
function extractTime(text)  { const m=(text||'').match(/\b\d{1,2}:\d{2}\b/); return m?m[0]:''; }

function buildCard(line) {
  if (!line.trim()) return '';
  const type    = classify(line);
  const people  = extractPeople(line);
  const time    = extractTime(line);
  const title   = stripPeople(line);
  const hint    = getHint(line);

  const peopleHtml = people.length
    ? `<div class="people-row">${people.map(p=>`<span class="person ${MICHAEL_NAMES.includes(p)?'michael':''}">${p}</span>`).join('')}</div>`
    : '';

  const hintHtml = hint?.hint
    ? `<div class="event-hint">${hint.hint}</div>`
    : '';

  const alertHtml = hint?.alert
    ? `<span class="event-alert alert-${hint.alertType||'info'}">${hint.alert}</span>`
    : '';

  return `
    <div class="event-item">
      <div class="timeline-col">
        <div class="timeline-line"></div>
        <div class="timeline-dot ${type}"></div>
        <div class="time-label">${time}</div>
      </div>
      <div class="event-card ${type}">
        <div class="event-type">${TYPE_LABELS[type]||''}</div>
        <div class="event-title">${title}</div>
        ${peopleHtml}
        ${hintHtml}
        ${alertHtml}
      </div>
    </div>`;
}

function buildSection(idx, date, weekday, cells) {
  const combined = cells.join('\n').toLowerCase();
  const isRace   = /first wave|second wave/.test(combined);
  const numBadge = isRace
    ? `<span class="day-number race-day">RACE DAY</span>`
    : `<span class="day-number">DAY ${idx+1}</span>`;
  const titleStyle = isRace ? ' style="color:var(--c-race)"' : '';

  let events = '';
  cells.forEach(cell => {
    if (!cell.trim()) return;
    cell.split('\n').forEach(line => { if(line.trim()) events += buildCard(line); });
  });

  return `
    <div class="day-section${idx===0?' active':''}" id="day-${idx}">
      <div class="day-header">
        ${numBadge}
        <span class="day-title"${titleStyle}>${date}　${weekday}</span>
      </div>
      <div class="event-list">${events}</div>
    </div>`;
}

async function fetchAndRender() {
  const lbl = document.getElementById('sync-label');
  lbl.textContent = '同步中⋯';
  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const rows = await resp.json();

    const dates    = (rows[1]||[]).slice(1).filter(d => String(d).trim());
    const weekdays = (rows[2]||[]).slice(1);
    const dataRows = rows.slice(3);
    const numDays  = dates.length;

    let tabsHtml = '', footerHtml = '', mainHtml = '';
    for (let i = 0; i < numDays; i++) {
      const isRaceDay = (weekdays[i]||'').toLowerCase() === 'sun';
      tabsHtml   += `<div class="day-tab${i===0?' active':''}" onclick="switchDay(${i})">${dates[i]}<span class="tab-date">${weekdays[i]||''}</span></div>`;
      footerHtml += `<button class="footer-btn${isRaceDay?' race-btn':''}${i===0?' active':''}" onclick="switchDay(${i})">${dates[i]}<br>${FOOTER_LABELS[i]||''}</button>`;
      const cells = dataRows.map(r => String(r[i+1]||'').trim());
      mainHtml   += buildSection(i, dates[i], weekdays[i]||'', cells);
    }

    document.getElementById('days-nav').innerHTML      = tabsHtml;
    document.getElementById('footer-nav').innerHTML    = footerHtml;
    document.getElementById('main-content').innerHTML  = mainHtml;
    document.getElementById('loading-screen').style.display = 'none';
    lbl.textContent = '已同步 ✓';
    setTimeout(() => { lbl.textContent = '即時同步 Sheets'; }, 2500);

  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    const es = document.getElementById('error-screen');
    es.style.display = 'flex';
    document.getElementById('error-msg').textContent = '無法取得行程資料，請確認網路連線後重試。\n\n(' + e.message + ')';
  }
}

function switchDay(idx) {
  document.querySelectorAll('.day-section').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.day-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.footer-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

fetchAndRender();
</script>
</body>
</html>
