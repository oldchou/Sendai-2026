<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙台半馬 2026 行程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a100d; --bg2:#111a14; --bg3:#172010;
    --accent:#3a8c52; --accent2:#6dba82; --gold:#a8c8a0;
    --text:#e4ede6; --text2:#8aab90; --border:rgba(100,180,120,0.12);
    --red:#c25b5b; --green:#3a8c52; --purple:#6dba82;
    --sendai:#2e7d45; --sendai-light:#4caf6a; --sendai-pale:#c8e6c9;
    --grey:#b0b8b0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }

  #loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:999; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--sendai-light); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading-screen p { font-size:13px; color:var(--text2); }

  #error-screen { display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:999; padding:2rem; }
  #error-screen p { font-size:14px; color:var(--text2); text-align:center; line-height:1.8; white-space:pre-line; }
  #error-screen button { background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:8px 20px; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

  header { background:var(--bg2); border-bottom:1px solid var(--border); padding:1.75rem 1.25rem 1.25rem; text-align:center; }
  .header-label { font-size:11px; letter-spacing:0.18em; color:var(--sendai-light); text-transform:uppercase; margin-bottom:0.4rem; }
  header h1 { font-family:'Noto Serif TC',serif; font-size:1.6rem; font-weight:600; color:var(--text); line-height:1.3; }
  .header-sub { margin-top:0.3rem; font-size:13px; color:var(--text2); }
  .header-badges { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:0.9rem; }
  .badge { display:inline-flex; align-items:center; gap:5px; background:rgba(58,140,82,0.15); border:1px solid rgba(58,140,82,0.35); border-radius:20px; padding:3px 12px; font-size:11px; color:var(--sendai-light); }
  .badge.blue { background:rgba(109,186,130,0.1); border-color:rgba(109,186,130,0.25); color:var(--accent2); }
  .badge.sync { background:rgba(58,140,82,0.1); border-color:rgba(58,140,82,0.3); color:var(--sendai-light); cursor:pointer; transition:opacity 0.2s; }
  .badge.sync:hover { opacity:0.75; }
  .dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

  .days-nav { display:flex; overflow-x:auto; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 0.5rem; scrollbar-width:none; position:sticky; top:0; z-index:50; }
  .days-nav::-webkit-scrollbar { display:none; }
  .day-tab { flex-shrink:0; padding:0.65rem 0.85rem; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; text-align:center; line-height:1.4; }
  .day-tab.active { color:var(--sendai-light); border-bottom-color:var(--sendai); }
  .day-tab:hover { color:var(--text); }
  .tab-date { font-size:10px; opacity:0.7; display:block; }

  main { padding:1rem 1rem 5rem; max-width:480px; margin:0 auto; }
  .day-section { display:none; }
  .day-section.active { display:block; }

  .day-header { display:flex; align-items:center; gap:10px; margin:0.25rem 0 1rem; }
  .day-number { background:var(--sendai); color:#e4ede6; font-size:10px; font-weight:700; letter-spacing:0.08em; padding:3px 8px; border-radius:4px; flex-shrink:0; }
  .day-number.race-day { background:var(--sendai-light); color:#0a100d; }
  .day-title { font-size:14px; font-weight:500; color:var(--text); flex:1; }

  .event-list { display:flex; flex-direction:column; gap:2px; }
  .event-item { display:flex; position:relative; }
  .timeline-col { width:52px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; position:relative; }
  .time-label { font-size:10px; color:var(--text2); padding-top:0.55rem; line-height:1.15; text-align:center; z-index:2; width:100%; }
  .timeline-line { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); width:1px; background:var(--border); }
  .timeline-dot { position:absolute; top:2.35rem; left:50%; transform:translateX(-50%); width:8px; height:8px; border-radius:50%; background:var(--bg3); border:1.5px solid var(--accent); z-index:1; }
  .timeline-dot.race   { border-color:var(--sendai-light); background:rgba(58,140,82,0.25); }
  .timeline-dot.flight { border-color:var(--accent2); }
  .timeline-dot.food   { border-color:var(--sendai-light); }
  .timeline-dot.hotel  { border-color:var(--grey); }
  .timeline-dot.car    { border-color:#e87a7a; }

  .event-card { flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:0.7rem 0.9rem; margin:0.45rem 0 0.45rem 10px; position:relative; overflow:hidden; min-height:3.2rem; }
  .event-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; background:var(--sendai); }
  .event-card.race::before   { background:var(--sendai-light); }
  .event-card.flight::before { background:var(--accent2); }
  .event-card.food::before   { background:var(--sendai); }
  .event-card.hotel::before  { background:var(--grey); }
  .event-card.car::before    { background:#e87a7a; }

  .event-type { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text2); margin-bottom:2px; }
  .event-title { font-size:14px; font-weight:500; color:var(--text); line-height:1.4; }
  .event-detail { font-size:12px; color:var(--text2); margin-top:4px; line-height:1.6; white-space:pre-line; }

  .people-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .person { font-size:10px; padding:2px 7px; border-radius:10px; background:rgba(58,140,82,0.12); color:var(--accent2); border:1px solid rgba(58,140,82,0.25); }
  .person.michael { background:rgba(109,186,130,0.18); color:var(--sendai-pale); border-color:rgba(109,186,130,0.4); }

  footer { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); padding:0.55rem 0.75rem; display:flex; justify-content:center; gap:6px; z-index:100; }
  .footer-btn { flex:1; max-width:100px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:11px; padding:5px 0; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.15s; line-height:1.4; text-align:center; }
  .footer-btn:hover, .footer-btn.active { background:rgba(46,125,69,0.2); color:var(--sendai-light); border-color:var(--sendai); }
  .footer-btn.race-btn { border-color:rgba(109,186,130,0.3); color:rgba(109,186,130,0.7); }
  .footer-btn.race-btn.active { border-color:var(--sendai-light); color:var(--sendai-light); background:rgba(46,125,69,0.2); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>載入最新行程⋯</p>
</div>
<div id="error-screen">
  <p id="error-msg"></p>
  <button onclick="location.reload()">重新載入</button>
</div>

<header>
  <div class="header-label">Trip Itinerary</div>
  <h1>仙台半程馬拉松</h1>
  <div class="header-sub">2026 年 5 月</div>
  <div class="header-badges">
    <div class="badge"><div class="dot"></div>21.0975 km · 仙台市</div>
    <div class="badge blue"><div class="dot"></div>7 人同行</div>
    <div class="badge sync" id="sync-badge" onclick="fetchAndRender()">
      <div class="dot"></div><span id="sync-label">即時同步 Sheets</span>
    </div>
  </div>
</header>

<div class="days-nav" id="days-nav"></div>
<main id="main-content"></main>
<footer id="footer-nav"></footer>

<script>
const SHEET_ID = '1cjrOJNbqSzRqIWfAISFqQCZa0uJzxu98hJpEqZRXVsY';
const SHEET_NAME = '行程一覽';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

const MICHAEL_NAMES = ['Michael','michael','麥可'];
const FOOTER_LABELS = ['出發','松島','報到','比賽','品酒','Day6','返台'];

function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  return lines.map(line => {
    const cols = []; let cur = ''; let q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (q && line[i+1]==='"') { cur+='"'; i++; } else q=!q; }
      else if (c===',' && !q) { cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function classify(text) {
  const t = (text||'').toLowerCase();
  if (/depart|arrive|br\d|jx\d|起飛|落地|航班|flight/.test(t)) return 'flight';
  if (/race|first wave|second wave|馬拉松|號碼布|選手報到|check.?in.*expo/.test(t)) return 'race';
  if (/hotel|check.?in|check.?out|住宿|飯店|旅館|一之坊|bach/.test(t)) return 'hotel';
  if (/餐|lunch|dinner|breakfast|牛舌|carbo|慶功/.test(t)) return 'food';
  if (/租車|還車|取車/.test(t)) return 'car';
  return 'default';
}

function extractPeople(text) {
  const matches = [...(text||'').matchAll(/\(([^)]+)\)/g)];
  const people = [];
  matches.forEach(m => m[1].split(',').forEach(p => { const n=p.trim(); if(n) people.push(n); }));
  return people;
}

function stripPeople(text) {
  return (text||'').replace(/\s*\([^)]+\)/g,'').trim();
}

function extractTime(text) {
  const m = (text||'').match(/\b\d{1,2}:\d{2}\b/);
  return m ? m[0] : '';
}

function buildEventCard(line) {
  if (!line.trim()) return '';
  const type = classify(line);
  const people = extractPeople(line);
  const time = extractTime(line);
  const title = stripPeople(line);
  return `
    <div class="event-item">
      <div class="timeline-col">
        <div class="timeline-line"></div>
        <div class="timeline-dot ${type}"></div>
        <div class="time-label">${time}</div>
      </div>
      <div class="event-card ${type}">
        <div class="event-title">${title}</div>
        ${people.length ? `<div class="people-row">${people.map(p=>`<span class="person ${MICHAEL_NAMES.includes(p)?'michael':''}">${p}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
}

function buildSection(idx, date, weekday, cells) {
  const combined = cells.join('\n');
  const isRace = /first wave|second wave/i.test(combined);
  const numBadge = isRace
    ? `<span class="day-number race-day">RACE DAY</span>`
    : `<span class="day-number">DAY ${idx+1}</span>`;
  const titleStyle = isRace ? ' style="color:var(--gold)"' : '';

  let events = '';
  cells.forEach(cell => {
    if (!cell.trim()) return;
    cell.split('\n').forEach(line => { if(line.trim()) events += buildEventCard(line); });
  });

  return `
    <div class="day-section${idx===0?' active':''}" id="day-${idx}">
      <div class="day-header">
        ${numBadge}
        <span class="day-title"${titleStyle}>${date} ${weekday}</span>
      </div>
      <div class="event-list">${events}</div>
    </div>`;
}

async function fetchAndRender() {
  const syncLabel = document.getElementById('sync-label');
  syncLabel.textContent = '同步中⋯';
  try {
    const resp = await fetch(CSV_URL + '&nocache=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const rows = parseCSV(await resp.text());

    const dates    = (rows[1]||[]).slice(1).filter(d=>d.trim());
    const weekdays = (rows[2]||[]).slice(1);
    const dataRows = rows.slice(3); // 上午, 午餐, 下午, 晚餐, 住宿, Note
    const numDays  = dates.length;

    let tabsHtml = '', footerHtml = '', mainHtml = '';

    for (let i = 0; i < numDays; i++) {
      const isRaceDay = (weekdays[i]||'').toLowerCase() === 'sun';
      tabsHtml += `<div class="day-tab${i===0?' active':''}" onclick="switchDay(${i})">${dates[i]}<span class="tab-date">${weekdays[i]||''}</span></div>`;
      footerHtml += `<button class="footer-btn${isRaceDay?' race-btn':''}${i===0?' active':''}" onclick="switchDay(${i})">${dates[i]}<br>${FOOTER_LABELS[i]||''}</button>`;
      const cells = dataRows.map(r => (r[i+1]||'').trim());
      mainHtml += buildSection(i, dates[i], weekdays[i]||'', cells);
    }

    document.getElementById('days-nav').innerHTML = tabsHtml;
    document.getElementById('footer-nav').innerHTML = footerHtml;
    document.getElementById('main-content').innerHTML = mainHtml;
    document.getElementById('loading-screen').style.display = 'none';

    syncLabel.textContent = '已同步 ✓';
    setTimeout(() => { syncLabel.textContent = '即時同步 Sheets'; }, 2500);

  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    const es = document.getElementById('error-screen');
    es.style.display = 'flex';
    document.getElementById('error-msg').textContent = '無法取得行程資料，請確認網路連線後重試。\n\n(' + e.message + ')';
  }
}

function switchDay(idx) {
  document.querySelectorAll('.day-section').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.day-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.footer-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

fetchAndRender();
</script>
</body>
</html>
